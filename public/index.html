<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻 HTML 日报 — JeekNews</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --success: #16a34a;
            --error: #dc2626;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        header {
            text-align: center;
            margin-bottom: 32px;
        }
        header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        header p {
            color: var(--text-secondary);
            font-size: 15px;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h2 {
            font-size: 18px;
            margin-bottom: 16px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.15s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }
        .form-row {
            display: flex;
            gap: 16px;
        }
        .form-row .form-group { flex: 1; }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            width: 100%;
        }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-deploy {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            background: #000;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        .btn-deploy:hover { opacity: 0.85; }
        .status {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .status.loading {
            display: block;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1e40af;
        }
        .status.success {
            display: block;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #166534;
        }
        .status.error {
            display: block;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .preview-frame {
            width: 100%;
            min-height: 600px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .source-list {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .source-list li {
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 20px;
            background: #f1f5f9;
            color: var(--text-secondary);
        }
        .source-list li.ok { background: #dcfce7; color: #166534; }
        .source-list li.fail { background: #fef2f2; color: #991b1b; }
        .deploy-section {
            text-align: center;
            margin-top: 12px;
        }
        .deploy-section p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>JeekNews — 新闻 HTML 日报</h1>
            <p>从 20 个中文新闻源抓取内容，生成自包含 HTML 日报</p>
        </header>

        <div class="card">
            <h2>生成日报</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>每源条目数 (10-20)</label>
                    <input type="number" id="limit" value="20" min="10" max="20">
                </div>
                <div class="form-group">
                    <label>超时时间 (秒)</label>
                    <input type="number" id="timeout" value="15" min="5" max="30">
                </div>
                <div class="form-group">
                    <label>重试次数</label>
                    <input type="number" id="retries" value="2" min="0" max="5">
                </div>
            </div>
            <button class="btn btn-primary" id="generateBtn" onclick="generateNews()">
                生成日报
            </button>
            <div class="status" id="status"></div>
        </div>

        <div class="card" id="sourcesCard" style="display:none;">
            <h2>数据源抓取结果</h2>
            <ul class="source-list" id="sourceList"></ul>
            <div class="preview-frame" id="previewFrame"></div>
        </div>

        <div class="deploy-section">
            <p>一键部署到你的 Vercel 账号</p>
            <a class="btn-deploy" href="https://vercel.com/new/clone?repository-url=https://github.com/guliacer/JeekNews" target="_blank" rel="noopener noreferrer">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 19.5h20L12 2z"/></svg>
                Deploy to Vercel
            </a>
        </div>
    </div>

    <script>
        async function generateNews() {
            const btn = document.getElementById('generateBtn');
            const status = document.getElementById('status');
            const preview = document.getElementById('previewFrame');
            const sourcesCard = document.getElementById('sourcesCard');
            const sourceList = document.getElementById('sourceList');

            const limit = document.getElementById('limit').value;
            const timeout = document.getElementById('timeout').value;
            const retries = document.getElementById('retries').value;

            btn.disabled = true;
            status.className = 'status loading';
            status.innerHTML = '<span class="spinner"></span> 正在从 20 个数据源抓取新闻，请耐心等待...';
            preview.style.display = 'none';
            sourcesCard.style.display = 'none';

            try {
                const params = new URLSearchParams({ limit, timeout, retries });
                const resp = await fetch(`/api/generate?${params}`);
                const data = await resp.json();

                if (data.success) {
                    status.className = 'status success';
                    status.textContent = `日报生成成功！${data.generated_at} · ${data.source_count}/${data.total_sources} 个数据源正常`;

                    sourceList.innerHTML = data.sources.map(s =>
                        `<li class="${s.ok ? 'ok' : 'fail'}">${s.name}${s.ok ? ` (${s.count}条)` : ` · ${s.error}`}</li>`
                    ).join('');
                    sourcesCard.style.display = 'block';

                    preview.style.display = 'block';
                    const blob = new Blob([data.html], { type: 'text/html;charset=utf-8' });
                    preview.src = URL.createObjectURL(blob);
                } else {
                    status.className = 'status error';
                    status.textContent = '生成失败：' + (data.error || '未知错误');
                }
            } catch (err) {
                status.className = 'status error';
                status.textContent = '请求失败：' + err.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
